    - data:
        code: "import json\nimport re\n\ndef main(jsonData: str) -> dict:\n\n    #\
          \ 解析外层JSON数据\n    #data = json.loads(jsonData)\n    #query_str = data['query']\n\
          \n    # 去除换行符和制表符\n    clean_str = re.sub(r'[\\n\\t]', '', jsonData)\n\n\
          \    # 去除转义的双引号（将\\\"替换为\"）\n    clean_str = re.sub(r'\\\\\"', '\"', clean_str)\n\
          \n    # 提取name和values的值\n    name_pattern = r'\"name\":\\s*\\[(.*?)\\]'\n\
          \    values_pattern = r'\"values\":\\s*\\[(.*?)\\]'\n\n    name_match =\
          \ re.search(name_pattern, clean_str)\n    values_match = re.search(values_pattern,\
          \ clean_str)\n\n    names = []\n    if name_match:\n        names = re.findall(r'\"\
          ([^\"]*)\"', name_match.group(1))\n\n    values = []\n    if values_match:\n\
          \        values = [float(num.strip()) for num in values_match.group(1).split(',')]\n\
          \n    option = {\n        \"xAxis\": {\n            \"type\": 'category',\n\
          \            \"data\": names\n        },\n        \"yAxis\": {\n       \
          \     \"type\": 'value'\n        },\n        \"series\": [\n           \
          \ {\n                \"data\": values,\n                \"type\": 'bar',\n\
          \                \"showBackground\": True,\n                \"backgroundStyle\"\
          : {\n                    \"color\": 'rgba(180, 180, 180, 0.2)'\n       \
          \         }\n            }\n        ]\n    };\n    # 生成输出文件\n    output\
          \ = f'```echarts\\n{json.dumps(option, ensure_ascii=False)}\\n```'\n   \
          \ return {\n        \"result\": output,\n    }\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: 代码执行
        type: code
        variables:
